<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Há quanto tempo eu amo você 💖</title><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffd6e7;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
}

.container{
    background:white;
    padding:35px;
    border-radius:25px;
    box-shadow:0 0 20px rgba(255,105,180,0.3);
    max-width:500px;
    width:90%;
}

h1{
    color:#ff4f93;
    margin-bottom:25px;
    font-size:2rem;
}

#contador{
    color:#ff66a3;
    font-size:1.8rem;
    font-weight:bold;
    line-height:1.8;
}
</style></head>
<body><div class="container">
    <h1>💖 Há quanto tempo eu amo você 💖</h1>
    <div id="contador"></div>
</div><script>
const inicio = new Date("2026-03-09T10:30:00");

function atualizarContador() {
    const agora = new Date();
    const diferenca = agora - inicio;

    const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diferenca / (1000 * 60 * 60)) % 24);
    const minutos = Math.floor((diferenca / (1000 * 60)) % 60);
    const segundos = Math.floor((diferenca / 1000) % 60);

    document.getElementById("contador").innerHTML =
        `${dias} dias<br>${horas} horas • ${minutos} minutos • ${segundos} segundos`;
}

atualizarContador();
setInterval(atualizarContador, 1000);
</script></body>
</html>
