<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Há quanto tempo eu amo você:</title><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd6e7, #fff0f7);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    background:#fff;
    width:100%;
    max-width:500px;
    padding:40px 30px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(255,105,180,.15);
}

h1{
    color:#ff4f93;
    font-size:2rem;
    margin-bottom:25px;
}

#contador{
    color:#ff66a3;
    font-size:2rem;
    font-weight:bold;
    line-height:1.8;
}
</style></head><body><div class="container">
    <h1>Há quanto tempo eu amo você:</h1><div id="contador">Carregando...</div>

</div><script>
const inicio = new Date("2026-03-09T10:30:00");

function atualizarContador() {
    const agora = new Date();
    const diferenca = agora - inicio;

    const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diferenca / (1000 * 60 * 60)) % 24);
    const minutos = Math.floor((diferenca / (1000 * 60)) % 60);
    const segundos = Math.floor((diferenca / 1000) % 60);

    document.getElementById("contador").innerHTML =
        dias + " dias<br>" +
        horas + " horas • " +
        minutos + " minutos • " +
        segundos + " segundos";
}

atualizarContador();
setInterval(atualizarContador, 1000);
</script></body>
</html>
